<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XVB-EPG Monitor</title>
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --text: #c9d1d9;
            --accent: #58a6ff;
            --success: #238636;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: var(--card);
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid #30363d;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        h1 { font-size: 1.5rem; margin-bottom: 1.5rem; color: var(--accent); }

        .status-box {
            margin: 20px 0;
            padding: 15px;
            background: rgba(88, 166, 255, 0.1);
            border-radius: 8px;
        }

        .time { font-weight: bold; color: white; display: block; margin-top: 5px; }

        .btn {
            display: inline-block;
            background-color: var(--success);
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 600;
            transition: opacity 0.2s;
            margin-top: 10px;
        }

        .btn:hover { opacity: 0.8; }

        .loader { font-size: 0.9rem; color: #8b949e; }
    </style>
</head>
<body>

<div class="container">
    <h1>XVB-EPG Status</h1>
    
    <div class="status-box">
        <span>Ultimo Aggiornamento Log:</span>
        <span id="log-time" class="time">Caricamento...</span>
    </div>

    <div class="status-box">
        <span>File XML Generato:</span>
        <br>
        <a id="xml-link" href="#" class="btn" target="_blank">Scarica EPG.xml</a>
    </div>

    <p class="loader" id="repo-info">Repo: jonathansanfilippo/xvb-epg</p>
</div>

<script>
    const USER = 'jonathansanfilippo';
    const REPO = 'xvb-epg';
    // Se il log ha un nome diverso (es. update.log), cambialo qui:
    const LOG_FILE = 'cron.log'; 
    const XML_FILE = 'epg.xml';

    async function fetchStatus() {
        try {
            // 1. Recupera info sull'ultimo commit per il log (più preciso del contenuto se il log è semplice)
            const logResponse = await fetch(`https://api.github.com/repos/${USER}/${REPO}/commits?path=${LOG_FILE}&per_page=1`);
            const logData = await logResponse.json();
            
            if (logData.length > 0) {
                const lastUpdate = new Date(logData[0].commit.committer.date);
                document.getElementById('log-time').innerText = lastUpdate.toLocaleString('it-IT');
            } else {
                document.getElementById('log-time').innerText = "File log non trovato";
            }

            // 2. Costruisce il link diretto al file XML (Raw)
            const xmlUrl = `https://raw.githubusercontent.com/${USER}/${REPO}/main/${XML_FILE}`;
            const linkElem = document.getElementById('xml-link');
            linkElem.href = xmlUrl;
            linkElem.innerText = `Apri ${XML_FILE}`;

        } catch (error) {
            console.error("Errore nel recupero dati:", error);
            document.getElementById('log-time').innerText = "Errore API";
        }
    }

    fetchStatus();
</script>

</body>
</html>
