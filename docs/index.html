<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="icon" type="image/png" href="assets/icon.jpg">
  <title>XVB-EPG Monitor</title>

  <style>
   :root {
  /* === STESSO SET DEL MANAGER === */
  --bg: #0d1117;
  --card: #161b22;
  --card2: #0d1117;
  --text: #e6edf3;
  --muted: rgba(255, 255, 255, 0.60);
  --muted2: rgba(255, 255, 255, 0.45);
  --accent: #58a6ff;

  --server2: #a971ff;
  --server: #49a6ff;
  --url: #ffb340;
  --local: #63e776;
  --danger: #f85149;

  --radius: 26px;
}

@media (prefers-color-scheme: light) {
  :root {
    --bg: #ffffff;
    --card: #f6f8fa;
    --card2: #ffffff;
    --text: #1f2328;
    --muted: rgba(0, 0, 0, 0.60);
    --muted2: rgba(0, 0, 0, 0.45);
    --accent: #007aff;

    --server2: #8046d9;
    --server: #007aff;
    --url: #ffab01;
    --local: #64c572;
    --danger: #cf222e;
  }
}

* { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
html, body { height: 100%; margin: 0; }

body{
  margin:0;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background: var(--bg);
  color:var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  letter-spacing: .1px;
  line-height: 1.5;
  padding: 24px;
}

/* === LAYOUT COME MANAGER === */
.wrap{
  width: min(1200px, 100%);
  margin: 0 auto;
  padding: 0 18px;
  display:flex;
  flex-direction:column;
  gap:18px;
}

/* Topbar = card flat (.hero/.section) */
.topbar{
  background: var(--card);
  border-radius: var(--radius);
  padding: 24px;
  border: none;
  box-shadow: none;

  display:flex;
  gap:12px;
  align-items:center;
  justify-content:space-between;
}

/* Titoli stile manager */
.title{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.title h1{
  margin:0;
  font-size: 26px;      /* uguale al tuo .h1 (monitor compat) */
  font-weight: 800;
  letter-spacing: -0.02em;
  color: var(--text);
  display:flex;
  align-items:center;
  gap:12px;
  flex-wrap: wrap;
}

.subtitle{
  margin:0;
  font-size: 14px;
  color: var(--muted);
}

/* pill stile “pill” del manager */
.pill{
  display:inline-flex;
  align-items:center;
  gap:10px;
  padding: 6px 10px;
  border-radius: 999px;
  border: none;
  background: var(--card2);
  color: var(--muted);
  font-size: 12px;
  font-weight: 700;
  white-space:nowrap;
}

/* dot: usiamo i tuoi colori come status */
.dot{
  width:10px; height:10px; border-radius:50%;
  background: var(--muted2);
}
.dot.ok{ background: var(--local); }
.dot.bad{ background: var(--danger); }
.dot.warn{ background: var(--url); }

.actions{
  display:flex;
  gap:10px;
  align-items:center;
}

/* Bottoni flat coerenti con hover/scale del manager */
.btn{
  appearance:none;
  height: 44px;
  padding: 0 14px;
  border-radius: 16px;
  border: none;
  background: var(--card2);
  color: var(--text);
  font-weight: 800;
  font-size: 13px;
  cursor:pointer;
  transition: opacity 0.2s, transform 0.1s;
}
.btn:hover{ opacity: 0.7; transform: scale(1.03); }
.btn:active{ transform: scale(0.97); }

.btn.primary{
  /* “primary” flat (non gradiente) coerente palette */
  background: color-mix(in srgb, var(--local) 18%, var(--card2));
}

/* grid identico */
.grid{
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:18px;
}
@media (max-width: 900px){
  .grid{ grid-template-columns: 1fr; }
  .actions{ flex-wrap:wrap; justify-content:flex-end; }
}

/* card = .section del manager */
.card{
  background: var(--card);
  border-radius: var(--radius);
  padding: 24px;
  border:none;
  box-shadow:none;
  overflow: visible;
}

/* header card: stessa logica label */
.card-h{
  padding: 0;
  margin-bottom: 16px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  border: none;
  background: transparent;
}

.card-h h2{
  margin:0;
  font-size: 14px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: .02em;
  color: var(--muted);
}

/* badge = pill */
.badge{
  font-size: 12px;
  padding: 4px 10px;
  border-radius: 999px;
  border:none;
  background: var(--card2);
  color: var(--muted);
  white-space:nowrap;
  font-weight: 700;
}

.card-b{
  padding: 0;
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* row = item background card2 */
.row{
  display:flex;
  justify-content:space-between;
  gap:12px;
  padding: 16px;
  border-radius: 18px;
  background: var(--card2);
  border: none;
}

.row .k{
  color: var(--muted);
  font-size: 12px;
  font-weight: 800;
  text-transform: uppercase;
  line-height: 1.2;
}
.row .v{
  font-weight: 900;
  font-size: 13px;
  color: var(--text);
  text-align:right;
  line-height: 1.2;
}

/* links come bottoni flat */
.links{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top: 4px;
}

a.link{
  display:inline-flex;
  align-items:center;
  gap:10px;
  height: 44px;
  padding: 0 14px;
  border-radius: 16px;
  text-decoration:none;
  color: var(--text);
  border:none;
  background: var(--card2);
  font-weight: 900;
  font-size: 13px;
  transition: opacity 0.2s, transform 0.1s;
}
a.link:hover{ opacity: 0.7; transform: scale(1.03); }
a.link:active{ transform: scale(0.97); }

a.link.green{
  background: color-mix(in srgb, var(--local) 18%, var(--card2));
}

/* footer coerente */
.footer{
  padding: 0 6px;
  display:flex;
  justify-content:space-between;
  gap:12px;
  color: var(--muted2);
  font-size: 13px;
}

code{
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
  color: var(--text);
}

/* error box: flat */
.err{
  display:none;
  padding: 16px;
  border-radius: 18px;
  background: color-mix(in srgb, var(--danger) 18%, var(--card2));
  color: var(--text);
  font-size: 13px;
  font-weight: 800;
  border: none;
}
  </style>
</head>

<body>
  <div class="wrap">
    <div class="topbar">
      <div class="title">
        <h1>
          XVB-EPG Monitor
          <span class="pill" title="Latest refresh status">
            <span id="statusDot" class="dot"></span>
            <span id="statusText">Waiting…</span>
          </span>
        </h1>
        <p class="subtitle">
          Repo: <code id="repoLabel">—</code> · API: <code>api.github.com</code>
        </p>
      </div>

      <div class="actions">
        <button class="btn" id="refreshBtn" type="button">Refresh</button>
        <button class="btn primary" id="toggleAutoBtn" type="button">Auto: ON</button>
      </div>
    </div>

    <div id="errorBox" class="err"></div>

    <div class="grid">
      <section class="card">
        <div class="card-h">
          <h2>Log</h2>
          <span class="badge" id="logBadge">—</span>
        </div>
        <div class="card-b">
          <div class="row">
            <div class="k">Last commit on log</div>
            <div class="v" id="logTime">Loading…</div>
          </div>
          <div class="row">
            <div class="k">Commit</div>
            <div class="v" id="logSha">—</div>
          </div>

          <div class="links">
            <a class="link" id="logRaw" href="#" target="_blank" rel="noopener">Open log (raw)</a>
            <a class="link" id="logWeb" href="#" target="_blank" rel="noopener">View on GitHub</a>
          </div>
        </div>
      </section>

      <section class="card">
        <div class="card-h">
          <h2>EPG XML</h2>
          <span class="badge" id="xmlBadge">—</span>
        </div>
        <div class="card-b">
          <div class="row">
            <div class="k">Last commit on epg.xml</div>
            <div class="v" id="xmlTime">Loading…</div>
          </div>
          <div class="row">
            <div class="k">Commit</div>
            <div class="v" id="xmlSha">—</div>
          </div>

          <div class="links">
            <a class="link green" id="xmlRaw" href="#" target="_blank" rel="noopener">Open / Download epg.xml</a>
            <a class="link" id="xmlWeb" href="#" target="_blank" rel="noopener">View on GitHub</a>
          </div>
        </div>
      </section>
    </div>

    <div class="footer">
      <div>Last refresh: <span id="lastRefresh">—</span></div>
      <div>Auto refresh: <span id="autoEvery">60s</span></div>
    </div>
  </div>

<script>
  // === CONFIG ===
  const USER = "jonathansanfilippo";
  const REPO = "xvb-epg";

  // IMPORTANT: these must be PATHS in the repo, NOT raw URLs
  const LOG_PATH = "log";
  const XML_PATH = "docs/epg.xml";
  const BRANCH  = "main";

  // Auto refresh
  const AUTO_SECONDS = 60;

  // === HELPERS ===
  const $ = (id) => document.getElementById(id);

  function setStatus(kind, text){
    const dot = $("statusDot");
    const label = $("statusText");
    dot.classList.remove("ok","bad","warn");
    if(kind === "ok") dot.classList.add("ok");
    else if(kind === "bad") dot.classList.add("bad");
    else if(kind === "warn") dot.classList.add("warn");
    label.textContent = text;
  }

  function showError(msg){
    const box = $("errorBox");
    box.style.display = "block";
    box.textContent = msg;
  }
  function clearError(){
    const box = $("errorBox");
    box.style.display = "none";
    box.textContent = "";
  }

  function fmtDate(iso){
    try{
      return new Date(iso).toLocaleString("en-GB");
    }catch{
      return "—";
    }
  }

  function shortSha(sha){
    if(!sha) return "—";
    return sha.slice(0, 7);
  }

  async function fetchLastCommitForPath(path){
    const url = `https://api.github.com/repos/${USER}/${REPO}/commits?path=${encodeURIComponent(path)}&sha=${encodeURIComponent(BRANCH)}&per_page=1`;
    const res = await fetch(url, { headers: { "Accept": "application/vnd.github+json" } });

    if(!res.ok){
      const remaining = res.headers.get("x-ratelimit-remaining");
      if(res.status === 403 && remaining === "0"){
        throw new Error("GitHub API rate limit reached. Try again later, or use a token.");
      }
      throw new Error(`GitHub API error (${res.status}) for path: ${path}`);
    }

    const data = await res.json();
    if(!Array.isArray(data) || data.length === 0) return null;

    const c = data[0];
    return {
      sha: c.sha,
      date: c.commit?.committer?.date || c.commit?.author?.date,
      html_url: c.html_url
    };
  }

  function setLinks(){
    $("repoLabel").textContent = `${USER}/${REPO}`;

    $("logRaw").href = `https://raw.githubusercontent.com/${USER}/${REPO}/${BRANCH}/${LOG_PATH}`;
    $("xmlRaw").href = `https://raw.githubusercontent.com/${USER}/${REPO}/${BRANCH}/${XML_PATH}`;

    $("logWeb").href = `https://github.com/${USER}/${REPO}/blob/${BRANCH}/${LOG_PATH}`;
    $("xmlWeb").href = `https://github.com/${USER}/${REPO}/blob/${BRANCH}/${XML_PATH}`;
  }

  async function refresh(){
    clearError();
    setStatus("warn", "Refreshing…");

    $("logTime").textContent = "Loading…";
    $("xmlTime").textContent = "Loading…";
    $("logSha").textContent  = "—";
    $("xmlSha").textContent  = "—";
    $("logBadge").textContent = LOG_PATH;
    $("xmlBadge").textContent = XML_PATH;

    try{
      const [logCommit, xmlCommit] = await Promise.all([
        fetchLastCommitForPath(LOG_PATH),
        fetchLastCommitForPath(XML_PATH)
      ]);

      if(logCommit){
        $("logTime").textContent = fmtDate(logCommit.date);
        $("logSha").textContent  = shortSha(logCommit.sha);
      }else{
        $("logTime").textContent = "Log file not found";
        $("logSha").textContent  = "—";
      }

      if(xmlCommit){
        $("xmlTime").textContent = fmtDate(xmlCommit.date);
        $("xmlSha").textContent  = shortSha(xmlCommit.sha);
      }else{
        $("xmlTime").textContent = "XML file not found";
        $("xmlSha").textContent  = "—";
      }

      $("lastRefresh").textContent = new Date().toLocaleString("en-GB");
      setStatus("ok", "Online");
    }catch(err){
      showError(String(err.message || err));
      $("lastRefresh").textContent = new Date().toLocaleString("en-GB");
      setStatus("bad", "Error");
      console.error(err);
    }
  }

  // === AUTO REFRESH ===
  let autoOn = true;
  let timer = null;

  function startAuto(){
    stopAuto();
    timer = setInterval(() => {
      if(autoOn) refresh();
    }, AUTO_SECONDS * 1000);
  }

  function stopAuto(){
    if(timer) clearInterval(timer);
    timer = null;
  }

  function updateAutoUI(){
    $("toggleAutoBtn").textContent = `Auto: ${autoOn ? "ON" : "OFF"}`;
    $("autoEvery").textContent = `${AUTO_SECONDS}s`;
  }

  // === INIT ===
  setLinks();
  updateAutoUI();
  startAuto();
  refresh();

  $("refreshBtn").addEventListener("click", refresh);
  $("toggleAutoBtn").addEventListener("click", () => {
    autoOn = !autoOn;
    updateAutoUI();
    setStatus("warn", autoOn ? "Auto refresh enabled" : "Auto refresh disabled");
  });
</script>
</body>
</html>
