name: Generate EPG (daily)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *"  

permissions:
  contents: write

concurrency:
  group: epg-daily
  cancel-in-progress: true

jobs:
  build-epg:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Generate docs/epg.xml
        run: |
          mkdir -p docs
          node ./scripts/build-epg.js > docs/epg.xml

      # --- NUOVO STEP AGGIUNTO ---
      - name: Create log file
        run: |
          # Ottiene l'ora di Londra in formato HH:mm
          LONDRA_TIME=$(TZ="Europe/London" date +"%H:%M")
          # Crea il file log con il formato richiesto
          echo "$LONDRA_TIME docs/epg.xml" > log

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Aggiunge sia l'xml che il nuovo file log
          git add docs/epg.xml log

          # Se non ci sono modifiche (nemmeno nel log), esce
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore(epg): daily update and log"
          git push
