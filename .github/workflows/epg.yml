name: Generate EPG (daily)

on:
  workflow_dispatch:
  schedule:
    - cron: "10 3 * * *"  # 03:10 UTC

permissions:
  contents: write

concurrency:
  group: epg-daily
  cancel-in-progress: true

jobs:
  build-epg:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate docs/epg.xml
        run: |
          mkdir -p docs
          node ./scripts/build-epg.js > docs/epg.xml

      - name: Commit & push if changed
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add docs/epg.xml
          git commit -m "chore(epg): daily update"
          git pushname: Build EPG (daily)

on:
  schedule:
    # ogni giorno alle 03:10 (UTC) ~ 04:10/05:10 in Italia a seconda DST
    - cron: "10 3 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Build EPG
        run: npm run build:epg

      - name: Commit & push if changed
        run: |
          git config user.name "xvb-epg bot"
          git config user.email "actions@users.noreply.github.com"

          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore(epg): daily update"
          git push
