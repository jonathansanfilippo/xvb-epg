name: Generate EPG (daily)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *"  

permissions:
  contents: write

concurrency:
  group: epg-daily
  cancel-in-progress: true

jobs:
  build-epg:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Generate docs/epg.xml
        run: |
          mkdir -p docs
          node ./scripts/build-epg.js > docs/epg.xml

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # aggiungi SEMPRE il file generato
          git add docs/epg.xml

          # se non c'è nulla in staging, esci
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore(epg): daily update"
          git push
